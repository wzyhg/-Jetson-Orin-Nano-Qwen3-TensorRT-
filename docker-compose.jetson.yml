services:
  kuiperllama:
    build:
      context: .
      dockerfile: Dockerfile.jetson
      args:
        BASE_IMAGE: ${BASE_IMAGE:-nvcr.io/nvidia/l4t-jetpack:r36.4.0}
        MODEL_SUPPORT: ${MODEL_SUPPORT:-QWEN2}
        CUDA_ARCHITECTURES: ${CUDA_ARCHITECTURES:-87}
    image: kuiperllama:jetson
    runtime: nvidia
    network_mode: host
    ipc: host
    shm_size: "2gb"
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      LD_LIBRARY_PATH: /workspaces/KuiperLLama/lib
    volumes:
      - ${MODEL_DIR:-./models}:/models
    working_dir: /workspaces/KuiperLLama
    stdin_open: true
    tty: true
